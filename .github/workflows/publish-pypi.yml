name: Publish PyPI

on:
  workflow_dispatch:

concurrency:
  group: publish-pypi
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        run: test "$GITHUB_REF" = refs/heads/main
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: 0.11.28
          python-version: "3.12"
      - name: Build and smoke-test distributions
        run: |
          rm -rf python/stdio-bridge/dist
          uv run --with build python/stdio-bridge/scripts/smoke-artifacts.sh "$GITHUB_WORKSPACE/python/stdio-bridge/dist"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pypi-distributions
          path: python/stdio-bridge/dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: pypi-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
